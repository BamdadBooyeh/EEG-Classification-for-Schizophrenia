name: eeg-schizo
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.12
  - pip

  # Scientific computing
  - numpy>=1.26
  - scipy>=1.11
  - matplotlib>=3.8

  # Notebook
  - jupyter
  - ipykernel

  # pip-only packages
  - pip:
    - mne>=1.6.0
    - kymatio>=0.3.0
    - PyWavelets>=1.4.1
    - scikit-learn>=1.3.0
    - xgboost>=2.0.0
    - torch>=2.1.0
    - joblib>=1.3.0
